name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-14  # Apple Silicon (arm64)
    permissions:
      contents: write
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agentos/package-lock.json

      - name: Install dependencies
        working-directory: agentos
        run: npm install --include=optional

      - name: Import signing certificate
        if: ${{ env.CSC_LINK != '' }}
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 20)
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12

          echo -n "$CSC_LINK" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CSC_KEY_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Make and publish
        working-directory: agentos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CSC_LINK must remain set so forge.config.ts enables osxSign/osxNotarize.
          # The actual certificate was imported into the keychain in the prior step.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_NAME: ${{ vars.CSC_NAME }}
          # Notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: npm run publish -- --arch arm64
